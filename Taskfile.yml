version: "3"

tasks:
  install:
    desc: Install dependencies
    cmd: bun install

  build:
    desc: Build TypeScript
    cmds:
      - bun run build

  clean:
    desc: Remove build artifacts
    cmd: rm -rf build/ dist/

  format:
    desc: Format with Biome
    cmds:
      - bun run format

  format:check:
    desc: Check formatting
    cmds:
      - bun run format:check

  lint:
    desc: Lint with Biome
    cmds:
      - bun run lint

  typecheck:
    desc: Type-check with TypeScript
    cmds:
      - bun run typecheck

  check:
    desc: Run lint and typecheck
    deps: [lint, typecheck]

  compile:
    desc: Compile to standalone binary
    cmds:
      - mkdir -p dist
      - bun build src/index.ts --compile --outfile dist/trello-cli

  compile:all:
    desc: Compile for all platforms
    cmds:
      - mkdir -p dist
      - bun build src/index.ts --compile --target=bun-linux-x64 --outfile dist/trello-cli-linux-x64
      - bun build src/index.ts --compile --target=bun-linux-arm64 --outfile dist/trello-cli-linux-arm64
      - bun build src/index.ts --compile --target=bun-darwin-x64 --outfile dist/trello-cli-darwin-x64
      - bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/trello-cli-darwin-arm64

  ci:
    desc: Run full CI pipeline locally
    cmds:
      - task: clean
      - task: install
      - task: format:check
      - task: check
      - task: build

  all:
    desc: Run full build pipeline
    cmds:
      - task: clean
      - task: install
      - task: build
      - task: check
